<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Brooklyn &mdash; Curriculum Browser</title>
<style>
:root{
  --paper:#F4F6F5; --surface:#FFFFFF; --surface-2:#ECF0EE;
  --ink:#17242A; --ink-2:#4B5E64; --ink-3:#616F72;
  --line:#D9E1DE; --line-2:#E7ECEA;
  --accent:#1E6E63; --accent-ink:#124039; --accent-tint:#E1EEEA;
  --warm:#9E541A; --warm-tint:#F3E6D6;
  --lvl1-bg:#E3F1ED; --lvl2-bg:#D2E9E2; --lvl3-bg:#C3E0D7;
  --shadow:0 1px 2px rgba(20,45,40,.05),0 8px 24px -12px rgba(20,45,40,.18);
  --radius:14px;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,"Cascadia Mono",Consolas,monospace;
}
@media (prefers-color-scheme:dark){:root{
  --paper:#0E181C; --surface:#14232A; --surface-2:#1B2E36;
  --ink:#E8EFEC; --ink-2:#BECCCA; --ink-3:#819697;
  --line:#26383F; --line-2:#203138;
  --accent:#5BC6B4; --accent-ink:#AEE3D8; --accent-tint:#173A38;
  --warm:#E0925A; --warm-tint:#33241A;
  --lvl1-bg:#183531; --lvl2-bg:#1B4B43; --lvl3-bg:#215E53;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -14px rgba(0,0,0,.6);
}}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
     font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{margin:0;line-height:1.15;text-wrap:balance}
p{margin:0}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent);text-decoration:none}

/* ---------- chrome ---------- */
.topbar{position:sticky;top:0;z-index:40;background:var(--surface);
        border-bottom:1px solid var(--line);padding:12px clamp(14px,4vw,32px);
        display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{font-weight:800;letter-spacing:-.02em;font-size:19px;color:var(--ink)}
.brand small{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
             text-transform:uppercase;color:var(--accent);font-weight:600;letter-spacing:.14em}
.crumbs{display:flex;gap:8px;align-items:center;font-size:14px;color:var(--ink-2);flex-wrap:wrap}
.crumbs a{color:var(--ink-2)} .crumbs a:hover{color:var(--accent)}
.crumbs .sep{color:var(--ink-3)}
.spacer{margin-left:auto}
.traybtn{border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:700;
         font-size:14px;padding:9px 16px;border-radius:10px;display:flex;align-items:center;gap:9px}
@media (prefers-color-scheme:dark){.traybtn{color:#06201c}}
/* transparent + currentColor: contrast follows the button text in both themes.
   A translucent white fill composited to 3.38:1 against white text. */
.traybtn .count{background:transparent;border:1.5px solid currentColor;color:inherit;
                border-radius:999px;padding:0 8px;font-size:12.5px;font-weight:700}
.traybtn[disabled]{opacity:.5;cursor:default}

.wrap{max-width:1120px;margin:0 auto;padding:clamp(20px,4vw,40px) clamp(14px,4vw,32px) 90px}

/* ---------- units grid ---------- */
.lede{color:var(--ink-2);max-width:62ch;margin-bottom:8px}
.phasebar{display:flex;align-items:baseline;gap:12px;margin:34px 0 16px;
          padding-bottom:10px;border-bottom:2px solid var(--accent);flex-wrap:wrap}
.phasebar .ph{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;
              background:var(--accent-tint);color:var(--accent-ink);padding:4px 10px;
              border-radius:999px;font-weight:600}
.phasebar h2{font-size:20px}
.phasebar .wk{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink-3)}
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:16px}
.ucard{display:block;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
       box-shadow:var(--shadow);padding:20px;color:inherit;transition:transform .12s,border-color .12s}
.ucard:hover{transform:translateY(-2px);border-color:var(--accent)}
.ucard .n{font-family:var(--mono);font-size:12.5px;color:var(--accent);font-weight:700;letter-spacing:.1em}
.ucard h3{font-size:19px;margin:6px 0 8px}
.ucard p{font-size:14px;color:var(--ink-2)}
.ucard .doms{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.dchip{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;background:var(--surface-2);
       border:1px solid var(--line);border-radius:6px;padding:3px 7px;color:var(--ink-2)}

/* ---------- unit detail ---------- */
.uhead{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
       box-shadow:var(--shadow);padding:clamp(18px,3vw,28px);margin-bottom:22px}
.uhead .n{font-family:var(--mono);font-size:12.5px;color:var(--accent);font-weight:700;letter-spacing:.1em}
.uhead h1{font-size:clamp(23px,4vw,32px);margin:6px 0 10px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.chip{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--surface-2);
      border-radius:999px;padding:5px 11px;color:var(--ink-2)}
.chip b{color:var(--ink)}
.fn{font-family:var(--serif);font-size:16.5px;background:var(--accent-tint);
    border-left:3px solid var(--accent);padding:11px 15px;border-radius:0 8px 8px 0;margin-top:16px}
details.meta{margin-top:16px;border-top:1px solid var(--line-2);padding-top:14px}
details.meta summary{font-family:var(--mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;
                     color:var(--ink-3);font-weight:600;cursor:pointer}
.metagrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:14px}
.box{background:var(--surface-2);border-radius:10px;padding:13px 15px}
.box h4{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
        color:var(--ink-3);margin-bottom:7px;font-weight:600}
.box ul{margin:0;padding-left:17px;color:var(--ink-2);font-size:14px}
.words{display:flex;flex-wrap:wrap;gap:5px}
.w{font-size:12.5px;background:var(--surface);border:1px solid var(--line);border-radius:6px;
   padding:2px 7px;color:var(--ink-2)}
.note{border:1px solid var(--warm);background:var(--warm-tint);border-radius:10px;padding:13px 15px;margin-top:16px}
.note h4{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
         color:var(--warm);margin-bottom:5px;font-weight:700}
.note p{font-size:14px}

/* ---------- page picker ---------- */
.pickhead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:26px 0 12px}
.pickhead h2{font-size:17px}
.pickhead .hint{font-size:13.5px;color:var(--ink-2)}
.btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:13px;
     font-weight:600;padding:7px 13px;border-radius:9px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
@media (prefers-color-scheme:dark){.btn.primary{color:#06201c}}
.matrix{display:grid;grid-template-columns:132px repeat(3,1fr);gap:10px;align-items:stretch}
.mh{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-3);padding:4px 2px;font-weight:600;align-self:end}
.rowlabel{font-weight:700;font-size:14px;display:flex;flex-direction:column;justify-content:center}
.rowlabel small{font-weight:400;color:var(--ink-3);font-size:11.5px}
.pcell{border:1.5px solid var(--line);border-radius:12px;padding:12px;background:var(--surface);
       display:flex;flex-direction:column;gap:9px;transition:border-color .12s}
.pcell.l1{background:var(--lvl1-bg)}.pcell.l2{background:var(--lvl2-bg)}.pcell.l3{background:var(--lvl3-bg)}
.pcell.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
.pcell .cando{font-size:13.5px;color:var(--ink);flex:1}
.pcell .acts{display:flex;gap:8px;align-items:center}
.pcell label{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);
             font-weight:600;cursor:pointer;user-select:none}
.pcell input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;margin:0}
.pcell a.view{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--accent-ink)}
/* --accent-ink, not --accent: --accent only reached 4.32:1 on the Level 3 cell */
@media (max-width:720px){
  .matrix{grid-template-columns:1fr}
  .mh{display:none}
  .rowlabel{margin-top:14px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .pcell::before{content:attr(data-lvl);font-family:var(--mono);font-size:10.5px;
                 letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
}

/* ---------- page view ---------- */
.pageview{display:grid;grid-template-columns:1fr;gap:18px}
.sheetwrap{background:var(--surface-2);border-radius:var(--radius);padding:clamp(12px,3vw,28px)}
.toolrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}

/* ---------- the printable sheet ---------- */
.sheet{background:#fff;color:#12181b;width:100%;max-width:8.5in;margin:0 auto 18px;
       padding:.55in .6in;box-shadow:0 6px 26px rgba(0,0,0,.16);font-size:13.5px;line-height:1.55}
.sheet .sh{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
           border-bottom:2px solid #12181b;padding-bottom:7px}
.sheet .course{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#4a5559}
.sheet h2{font-size:23px;margin-top:3px;color:#12181b}
.sheet .lvlbox{border:1.5px solid #12181b;border-radius:7px;padding:5px 11px;text-align:center;
               font-family:var(--mono);font-size:10.5px;line-height:1.35;white-space:nowrap}
.sheet .idrow{display:flex;gap:26px;margin:14px 0 16px;font-size:13px}
.sheet .idrow span{flex:1;display:flex;gap:8px;align-items:baseline}
.sheet .idrow i{font-style:normal;border-bottom:1px solid #12181b;flex:1}
.sheet .obj{background:#f1f4f3;border-left:3px solid #1E6E63;padding:10px 13px;margin-bottom:16px;font-size:13.5px}
.sheet .obj b{color:#124039}
.sheet .sect{font-family:var(--mono);font-size:11px;letter-spacing:.11em;text-transform:uppercase;
             color:#1E6E63;font-weight:700;margin:16px 0 8px}
.sheet .frame{font-family:var(--serif);font-size:17px;line-height:2.5}
.sheet .blank{display:inline-block;min-width:104px;border-bottom:1.5px solid #12181b;margin:0 5px}
.sheet .lines i{display:block;border-bottom:1px solid #9aa4a7;height:30px}
.sheet .boxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:9px}
.sheet .abox{border:1.5px solid #12181b;border-radius:8px;height:54px;display:flex;
             align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:#4a5559}
.sheet .bank{display:flex;flex-wrap:wrap;gap:7px}
.sheet .bank span{border:1.5px solid #12181b;border-radius:7px;padding:5px 11px;font-family:var(--serif);font-size:14px}
.sheet .imgslot{border:1.5px dashed #9aa4a7;border-radius:8px;padding:16px;text-align:center;
                color:#6b7679;font-size:12px;font-family:var(--mono);margin-bottom:14px}
.sheet .tnote{border:1px solid #c9a98d;background:#fbf5ee;border-radius:8px;padding:11px 13px;margin-top:14px;font-size:12.5px}
.sheet .tnote b{font-family:var(--mono);font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:#8a5a24;display:block;margin-bottom:4px}
.sheet .tgrid{display:grid;gap:10px}
.sheet .trow{border-top:1px solid #dde3e2;padding-top:9px}
.sheet .trow b{font-family:var(--mono);font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:#4a5559;display:block;margin-bottom:3px}
.sheet .foot{border-top:1px solid #dde3e2;margin-top:18px;padding-top:8px;
             font-family:var(--mono);font-size:9.5px;color:#6b7679;display:flex;justify-content:space-between;gap:12px}

/* ---------- tray ---------- */
.scrim{position:fixed;inset:0;background:rgba(8,18,20,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .18s}
.scrim.open{opacity:1;pointer-events:auto}
.tray{position:fixed;top:0;right:0;height:100%;width:min(420px,100%);background:var(--surface);
      border-left:1px solid var(--line);z-index:60;transform:translateX(100%);transition:transform .22s;
      display:flex;flex-direction:column}
.tray.open{transform:none}
.tray header{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.tray header h2{font-size:17px}
.tray .x{margin-left:auto;border:0;background:transparent;color:var(--ink-2);font-size:24px;line-height:1;padding:0 4px}
.tray .body{flex:1;overflow:auto;padding:16px 20px}
.tray .foot{border-top:1px solid var(--line);padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.titem{display:flex;gap:11px;align-items:flex-start;padding:11px;border:1px solid var(--line);
       border-radius:10px;margin-bottom:9px;background:var(--surface-2)}
.titem .meta{flex:1;min-width:0}
.titem .t{font-size:13.5px;font-weight:700}
.titem .s{font-size:12px;color:var(--ink-2)}
.titem button{border:0;background:transparent;color:var(--ink-3);font-size:18px;line-height:1;padding:0 2px}
.titem button:hover{color:var(--warm)}
.empty{color:var(--ink-2);font-size:14px;text-align:center;padding:40px 10px}
.segrow{display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.segrow button{flex:1;border:0;background:var(--surface);color:var(--ink-2);font-size:13px;
               font-weight:600;padding:9px 6px}
.segrow button[aria-pressed=true]{background:var(--accent);color:#fff}
@media (prefers-color-scheme:dark){.segrow button[aria-pressed=true]{color:#06201c}}
.copiesrow{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink-2)}
.copiesrow input{width:64px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;
                 background:var(--surface);color:var(--ink);font-family:inherit;font-size:14px}

/* ---------- print ---------- */
#printArea{display:none}
@media print{
  @page{size:letter portrait;margin:.45in}
  body{background:#fff}
  .topbar,.wrap,.tray,.scrim,.no-print{display:none !important}
  #printArea{display:block}
  .sheet{box-shadow:none;margin:0;padding:0;max-width:none;width:auto;
         break-after:page;page-break-after:always}
  .sheet:last-child{break-after:auto;page-break-after:auto}
  .sheet .imgslot{border-color:#b9c1c0}
}
</style>
</head>
<body>
<div class="topbar no-print">
  <div class="brand"><small>Brooklyn</small>Curriculum</div>
  <nav class="crumbs" id="crumbs"></nav>
  <span class="spacer"></span>
  <button class="traybtn" id="trayBtn">Print tray <span class="count" id="trayCount">0</span></button>
</div>

<main class="wrap" id="main"></main>

<div class="scrim no-print" id="scrim"></div>
<aside class="tray no-print" id="tray" aria-label="Print tray">
  <header><h2>Print tray</h2><button class="x" id="trayClose" aria-label="Close">&times;</button></header>
  <div class="body" id="trayBody"></div>
  <div class="foot">
    <div class="segrow" id="trayModes">
      <button data-mode="student">Student</button>
      <button data-mode="teacher">Teacher</button>
      <button data-mode="both">Both</button>
    </div>
    <div class="copiesrow">
      <label for="copies">Copies of each set</label>
      <input id="copies" type="number" min="1" max="40" value="1">
    </div>
    <button class="btn primary" id="printBtn">Print selected pages</button>
    <button class="btn" id="clearAll">Clear tray</button>
  </div>
</aside>

<div id="printArea"></div>

<script>window.__BROOKLYN__ = [{"no":"01","title":"Hello & Who I Am","phase":"A","weeks":"1–2","focus":"Greet and respond, introduce myself, give personal information, spell my name.","standards":{"wida":{"standards":["SI"],"keyUses":["Inform"]}},"function":"Introduce myself and give personal information","grammar":["My name is ___.","I am from ___.","I speak ___.","This is ___."],"vocabulary":{"core":["hello","hi","goodbye","name","my","your","from","speak","yes","no","please","thank you","nice to meet you"],"academic":["introduce","information","country","language","first name","last name"]},"foundationalLiteracy":"The alphabet as names of letters, not yet sounds. Recognize and write my own name accurately. Letter formation for the letters in my name and country.","culturalNote":"Name order varies by culture — in many countries the family name comes first. Ask how a student wants to be called and say it correctly; a mispronounced name on day one is the fastest way to lose a newcomer. Some students have a name they use at home and one assigned at a border or camp. Let them choose.","cards":[{"id":"u01-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Point to the right person or photo when greeted or named aloud.","scaffold":"Photo cards of classmates on the desk. Teacher says one name; student points. Gesture accepted as a full answer.","check":"Points to the correct photo in 4 of 5 trials.","l1Bridge":"Preview hello, name, and from in the home language; pointing to the photo is a full answer."},"2":{"canDo":"Identify a person's name and country from a short spoken introduction.","scaffold":"Two-column picture grid (names / flags). Audio replays on demand at slowed rate.","check":"Marks the correct name and country from a 3-sentence spoken introduction.","l1Bridge":"Give country and language names in the home language first, then English, so only the frame is new."},"3":{"canDo":"Follow a multi-part spoken introduction and match details to the right people.","scaffold":"Note-catcher grid with three columns. Audio plays twice at normal rate.","check":"Correctly matches 3 speakers to name, country, and language from connected speech.","l1Bridge":"Note-catcher may be annotated in the home language; the matching task stays in English."}}},{"id":"u01-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Say a one-word greeting and my name.","scaffold":"Echo an audio model. Word bank with photo support. A wave counts as the greeting.","check":"Produces a greeting plus own name intelligibly to a partner.","l1Bridge":"Student may greet in the home language first, then echo the English model. Both count."},"2":{"canDo":"Give a 2–3 sentence self-introduction using a model.","scaffold":"Sentence frames with three slots (name / country / language) and a world map.","check":"Produces 3 framed sentences with correct personal information.","l1Bridge":"Rehearse the three-slot frame silently in the home language before producing it in English."},"3":{"canDo":"Introduce myself and ask a partner one question back.","scaffold":"Open frame plus one modeled question. No word bank required.","check":"Introduces self in connected speech and initiates one question to a partner.","l1Bridge":"Plan the reciprocal question in the home language; deliver it in English."}}},{"id":"u01-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize my own name and the words hello, name, from with picture support.","scaffold":"Word–picture matching cards. Own name shown alongside three distractors.","check":"Selects own written name from 4 options; matches 3 core words to pictures.","l1Bridge":"If the home language uses a different script, show the student's own name in both."},"2":{"canDo":"Read a labeled ID card and find name, country, and language.","scaffold":"Highlighter task on a large-print ID card with icon labels on each field.","check":"Locates and highlights all three fields on an unfamiliar ID card.","l1Bridge":"ID-card field labels (name, country, language) glossed in the home language."},"3":{"canDo":"Read a short peer profile and match it to the correct photo.","scaffold":"Three 2-sentence profiles, three photos. Key vocabulary glossed in the margin.","check":"Matches 3 of 3 profiles to photos using details, not guessing.","l1Bridge":"Home-language glossary for the three profiles; the matching is done in English."}}},{"id":"u01-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Trace and copy my name and country onto a name-tent.","scaffold":"Dotted-line tracing guide, then a copy line. Model card stays in view.","check":"Produces a legible name-tent with own name spelled correctly.","l1Bridge":"Where the home script differs, practice the Latin-alphabet form alongside the original."},"2":{"canDo":"Complete a personal-information form (name, country, language).","scaffold":"Labeled form with icons and a word bank of country and language names.","check":"Completes all three fields legibly and in the correct slots.","l1Bridge":"Form labels glossed in the home language; the student writes in English."},"3":{"canDo":"Write 2–3 sentences introducing myself.","scaffold":"Starter capitals provided; punctuation reminder strip at the top of the page.","check":"Writes 3 sentences with capital letters on names and end punctuation.","l1Bridge":"Draft one sentence in the home language, then write all three in English."}}}],"workedTask":{"domain":"Speaking","prompt":"Introduce yourself","levels":{"1":{"say":"Hello. I am [name].","scaffold":"Word bank + photo cards. Traces a frame, fills one blank, echoes an audio model. Gesture routine for hello."},"2":{"say":"Hello. My name is [name]. I am from [country]. I speak [language].","scaffold":"Sentence frames + a world map. Fills three slots, produces the string aloud from the model."},"3":{"say":"Hi, my name is [name]. I'm from [country], and I speak [language] and a little English. [question]","scaffold":"Open frame + one modeled question. Extends independently and initiates an exchange with a partner."}}}},{"no":"02","title":"My School","phase":"A","weeks":"3–4","focus":"Places in the building, school staff and their jobs, supplies, reading my schedule.","standards":{"wida":{"standards":["SI"],"keyUses":["Inform"]}},"function":"Locate places and people in my school and say where I need to go","grammar":["Where is the ___?","The ___ is ___ (next to / near / upstairs).","I need to go to the ___.","This is Ms./Mr. ___. She/He is the ___."],"vocabulary":{"core":["office","nurse","bathroom","cafeteria","library","gym","classroom","hallway","teacher","principal","counselor","pencil","paper","notebook","backpack"],"academic":["schedule","period","room number","locate","staff","attendance"]},"foundationalLiteracy":"Letter–sound correspondence for initial consonants using school words. Reading numerals on doors and matching them to a written schedule.","culturalNote":"School structures differ enormously. Passing periods, lockers, bells, and choosing your own lunch may all be new. Some students come from schools where you stay in one room all day, and some have never been in a school building at all. Walk the building physically before teaching the words.","cards":[{"id":"u02-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Point to a place in the school when it is named aloud.","scaffold":"Picture map of the building with icons. Teacher names one place; student points.","check":"Points to the correct place for 5 of 6 named locations.","l1Bridge":"Building photos labeled in the home language on first exposure only."},"2":{"canDo":"Understand a short spoken direction to a place in the building.","scaffold":"Simplified floor map with a start marker. Direction repeated on request.","check":"Traces the correct route on the map from a 2-step spoken direction.","l1Bridge":"Direction words pre-taught in the home language before the map task."},"3":{"canDo":"Follow a multi-step announcement and identify where I need to go and when.","scaffold":"Note-catcher with where / when / who columns. Audio at normal rate, played twice.","check":"Extracts place, time, and person from a 4-sentence announcement.","l1Bridge":"Note-catcher headings glossed; the announcement stays in English."}}},{"id":"u02-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Name a place in the school and say it when I need to go there.","scaffold":"Bathroom/nurse pass cards with the word and icon. One-word response accepted.","check":"Says or shows the correct place word to request permission.","l1Bridge":"Student may name the place in the home language while showing the pass card; teacher supplies the English."},"2":{"canDo":"Ask where a place is and say where I need to go.","scaffold":"Frame strip: Where is the ___? / I need to go to the ___.","check":"Asks a staff member for a location using a full framed question.","l1Bridge":"Rehearse 'Where is the ___?' after hearing the equivalent question in the home language."},"3":{"canDo":"Give a classmate directions to a place in the building.","scaffold":"Preposition bank (next to, across from, upstairs) plus a map to reference.","check":"Produces a 2–3 step direction a peer can actually follow.","l1Bridge":"Plan the route in the home language, give the directions in English."}}},{"id":"u02-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize school signs and room numbers.","scaffold":"Real photographs of the building's own signage. Word–photo matching.","check":"Matches 5 signs (office, exit, restroom, library, nurse) to photos.","l1Bridge":"Pair each real sign photo with its home-language meaning once, then remove the gloss."},"2":{"canDo":"Read my class schedule and find the room for a given period.","scaffold":"Enlarged schedule with color-coded periods and an icon per subject.","check":"Names the correct room and teacher for 3 requested periods.","l1Bridge":"Schedule column headers (period, room, teacher) glossed in the home language."},"3":{"canDo":"Read a short staff directory and say who to go to for a problem.","scaffold":"Directory with roles glossed in plain language. Three scenario cards.","check":"Matches 3 scenarios (sick, lost schedule, new to school) to the right staff member.","l1Bridge":"Staff role names glossed — job titles rarely transfer directly between school systems."}}},{"id":"u02-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Copy my room numbers and teacher names onto a schedule card.","scaffold":"Pre-printed grid; student copies from the official schedule into a pocket card.","check":"Produces a legible personal schedule card with correct room numbers.","l1Bridge":"Room numbers are language-neutral; start here to build early success."},"2":{"canDo":"Label a map of my school with the places I use.","scaffold":"Blank building map, word bank of 8 places, icons on the bank.","check":"Labels 6 of 8 locations correctly.","l1Bridge":"Map word bank shown bilingually; labels written in English."},"3":{"canDo":"Write a short note asking to go somewhere or asking for help.","scaffold":"Model note plus a polite-phrase bank (May I…, I need…, Thank you).","check":"Writes a 2-sentence note with a request and a courtesy phrase.","l1Bridge":"Draft the note in the home language if needed, then write the English version."}}}],"workedTask":{"domain":"Speaking","prompt":"Ask where something is","levels":{"1":{"say":"[place]?","scaffold":"Points to a picture card and says the single place word with rising intonation. Pass card in hand. Teacher models the full question back."},"2":{"say":"Excuse me. Where is the [place]?","scaffold":"Frame strip taped inside the notebook cover. Practices with a partner before asking real staff."},"3":{"say":"Excuse me, I'm looking for the [place]. I have [subject] next period. Is it [direction]?","scaffold":"Open frame plus a preposition bank. Confirms understanding by repeating the direction back."}}}},{"no":"03","title":"Classroom Language","phase":"A","weeks":"5–6","focus":"Follow common commands, ask for help, understand yes/no and wh- questions.","standards":{"wida":{"standards":["SI","LA"],"keyUses":["Inform"]}},"function":"Follow classroom directions and ask for what I need to participate","grammar":["Imperatives: Open ___. Take out ___. Turn to ___.","Can you repeat that, please?","I don't understand.","How do you say ___ in English?","Yes/no questions vs. wh- questions (what, where, who, when)"],"vocabulary":{"core":["open","close","take out","put away","listen","look","write","read","stand up","sit down","line up","page","book","help","repeat","slowly","again"],"academic":["direction","instruction","question","answer","example","practice","turn in","due"]},"foundationalLiteracy":"Sight words for high-frequency classroom verbs. Recognizing question words in print by their initial wh- pattern.","culturalNote":"In many cultures saying 'I don't understand' to a teacher is disrespectful, or admitting confusion causes loss of face — so students nod and smile while understanding nothing. Teach and explicitly celebrate help-seeking as correct school behavior. This unit is the single highest-leverage one in Phase A: it unlocks every mainstream class the student sits in.","cards":[{"id":"u03-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Respond physically to a one-step classroom command.","scaffold":"Total Physical Response routine. Teacher models the action while saying it.","check":"Performs the correct action for 8 of 10 one-step commands without a model.","l1Bridge":"Demonstrate each command physically; confirm meaning in the home language once, then drop it."},"2":{"canDo":"Follow a two-step direction and identify the wh- question being asked.","scaffold":"Question-word poster with icons (what = thing, where = place, who = person).","check":"Completes 2-step directions and sorts 5 questions by their question word.","l1Bridge":"Question words (what/where/who/when) glossed in the home language on the poster."},"3":{"canDo":"Follow multi-step academic directions and know when I have missed something.","scaffold":"Directions given once at normal rate; student may request one repeat.","check":"Completes a 3-step task and self-identifies the step that needs clarifying.","l1Bridge":"Student may take notes in the home language while following English directions."}}},{"id":"u03-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Ask for help using a single word or a help card.","scaffold":"Desk card with help / bathroom / I don't understand and an icon for each. Pointing counts.","check":"Signals a need using the card or word without prompting, twice in a class period.","l1Bridge":"Help card printed in both languages so the student can signal without speaking English."},"2":{"canDo":"Ask someone to repeat or slow down using a full phrase.","scaffold":"Frame strip taped to the desk. Practiced chorally at the start of each session.","check":"Uses a repair phrase (repeat / slowly / I don't understand) unprompted in real time.","l1Bridge":"State explicitly, in the home language, that asking a teacher to repeat is polite here."},"3":{"canDo":"Ask a clarifying question about the task itself.","scaffold":"Question stem bank: Do we…? Should I…? What page…? Is this due…?","check":"Asks a specific clarifying question that resolves a genuine ambiguity.","l1Bridge":"Formulate the clarifying question in the home language, ask it in English."}}},{"id":"u03-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize common written direction words with icon support.","scaffold":"Icon-and-word cards for circle, write, match, draw, read.","check":"Matches 6 direction words to their icons.","l1Bridge":"Direction verbs paired with icons and a one-time home-language gloss."},"2":{"canDo":"Read the directions on a worksheet and know what to do.","scaffold":"Directions highlighted; verb underlined. Glossary strip at the top of the page.","check":"Correctly starts 3 of 3 tasks based on written directions alone.","l1Bridge":"Worksheet direction verbs glossed in the margin."},"3":{"canDo":"Read a short assignment description and identify the task, the format, and the due date.","scaffold":"Annotation guide: box the verb, circle the due date, underline the product.","check":"Extracts all three elements from an authentic assignment sheet.","l1Bridge":"Assignment terms (due, submit, draft) glossed — several are false friends."}}},{"id":"u03-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Copy the date, my name, and the page number onto my work.","scaffold":"Heading template printed at the top of every packet page.","check":"Heads a paper correctly and independently.","l1Bridge":"Heading fields (name, date, page) labeled bilingually on the template."},"2":{"canDo":"Write a question I have about the lesson.","scaffold":"Question stem bank plus an exit-ticket slip with one line.","check":"Writes a legible question using a correct question word and a question mark.","l1Bridge":"Student may write the question in the home language first, then translate with support."},"3":{"canDo":"Write a short message to a teacher explaining what I need.","scaffold":"Model message plus a politeness bank. Reminder to state the class and the problem.","check":"Writes 2–3 sentences that name the class, the problem, and the request.","l1Bridge":"Drafting in the home language is permitted; the message is submitted in English."}}}],"workedTask":{"domain":"Speaking","prompt":"Tell the teacher you don't understand","levels":{"1":{"say":"[help]","scaffold":"Shows the desk card or says the single word help. Teacher responds with the full phrase modeled back. Zero-risk entry point — the goal is that the student signals at all."},"2":{"say":"I don't understand. Can you repeat that, please?","scaffold":"Two-sentence frame practiced chorally daily until automatic. Sentence strip stays taped to the desk."},"3":{"say":"I'm sorry, I don't understand the [part]. Do you mean [restatement]? Can you show me an example?","scaffold":"Open frame. Names the specific point of confusion and proposes an interpretation — the beginning of academic self-advocacy."}}}},{"no":"04","title":"Numbers, Time & Calendar","phase":"A","weeks":"7–8","focus":"Count, days and months, tell time, talk about my daily schedule.","standards":{"wida":{"standards":["SI","MA"],"keyUses":["Inform"]}},"function":"Say and understand times, dates, and quantities in school life","grammar":["It is ___ o'clock. / It is ___ thirty.","What time is ___?","My ___ class is at ___.","Ordinal numbers: first, second, third…","on Monday / in January / at 3:00"],"vocabulary":{"core":["numbers 1–100","o'clock","half past","morning","afternoon","night","today","tomorrow","yesterday","days of the week","months","early","late","before","after"],"academic":["schedule","calendar","date","duration","quantity","digit","equals","total"]},"foundationalLiteracy":"Number words in print alongside numerals. Writing the date in US format and recognizing that it differs from the day/month order used in most of the world.","culturalNote":"Date format is a real source of error and embarrassment: 03/04 is March 4th here and April 3rd almost everywhere else. Teach it explicitly. Twelve-hour time with a.m./p.m. is also unfamiliar to students from 24-hour-clock countries. Some SLIFE students need genuine number-sense work, not just the English words — coordinate with the math teacher rather than assuming the concept is present.","cards":[{"id":"u04-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Identify a number or a day when it is said aloud.","scaffold":"Number line and day cards on the desk. Student points or holds up the card.","check":"Identifies 8 of 10 spoken numbers 1–31 and 5 of 7 days.","l1Bridge":"Check which numbers the student already holds in the home language before teaching English ones."},"2":{"canDo":"Understand a spoken time and match it to a clock.","scaffold":"Analog and digital clock pairs. Times limited to the hour and half hour.","check":"Matches 6 of 8 spoken times to the correct clock face.","l1Bridge":"State explicitly, in the home language, that US clocks use 12-hour time with a.m./p.m."},"3":{"canDo":"Follow a spoken schedule change and identify what moved and when.","scaffold":"Note-catcher with old time / new time columns. Announcement played twice.","check":"Correctly reports the changed event and its new time and day.","l1Bridge":"Note-catcher headings glossed; the announcement stays in English."}}},{"id":"u04-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Count aloud and say the day or the time from a model.","scaffold":"Choral counting routine. Clock manipulative in hand.","check":"Counts 1–20 and names the current day.","l1Bridge":"Counting may be rehearsed in the home language first to confirm number sense, then in English."},"2":{"canDo":"Say what time a class starts and what day something happens.","scaffold":"Frame: My ___ class is at ___. / ___ is on ___. Schedule in view.","check":"States 3 class times and days accurately from own schedule.","l1Bridge":"Subject names glossed in the home language on the schedule."},"3":{"canDo":"Describe my week and explain a scheduling conflict.","scaffold":"Time-preposition bank (on, at, in, before, after) and a weekly grid.","check":"Describes a week in connected speech and explains one conflict with because.","l1Bridge":"Reason about the scheduling conflict in the home language, explain it in English."}}},{"id":"u04-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Read numerals, days, and months on a calendar.","scaffold":"Large classroom calendar. Day and month names color-coded.","check":"Locates today's date and names the month on a printed calendar.","l1Bridge":"Day and month names glossed once; numerals need no translation."},"2":{"canDo":"Read a bus, bell, or lunch schedule and find a specific time.","scaffold":"Authentic school schedule, enlarged, with the target row highlighted.","check":"Answers 4 of 5 time questions from a real schedule.","l1Bridge":"Schedule headings glossed in the home language."},"3":{"canDo":"Read a school calendar and identify deadlines, holidays, and early-release days.","scaffold":"Month view with a legend. Three scenario questions.","check":"Identifies the next no-school day and the date an assignment is due.","l1Bridge":"Calendar legend terms (early release, no school) glossed — these are district-specific."}}},{"id":"u04-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Write numerals and copy today's date correctly.","scaffold":"Date frame with month/day/year labels above the blanks.","check":"Writes the current date in US format without a model.","l1Bridge":"Explicitly contrast US month/day/year order with the student's home format, in the home language."},"2":{"canDo":"Fill in a weekly schedule with times and subjects.","scaffold":"Blank weekly grid, word bank of subjects, own schedule to copy from.","check":"Completes a weekly grid with correct times for 5 classes.","l1Bridge":"Subject word bank shown bilingually."},"3":{"canDo":"Write a short plan for my week using time expressions.","scaffold":"Preposition bank plus a model paragraph. Requires at least three time phrases.","check":"Writes 4–5 sentences using on, at, and before/after correctly.","l1Bridge":"Plan the week in the home language, write it in English."}}}],"workedTask":{"domain":"Speaking","prompt":"Say when your class is","levels":{"1":{"say":"[number].","scaffold":"Points to the time on a clock manipulative and says the hour number only. Teacher expands to the full sentence and the student echoes."},"2":{"say":"My [subject] class is at [time].","scaffold":"Frame with two slots plus the student's own printed schedule as the source of the answer."},"3":{"say":"I have [subject] at [time] on [day], so I can't come [other time]. Can I come [alternative] instead?","scaffold":"Open frame plus a preposition bank. Uses the schedule to reason about a conflict and propose a solution."}}}},{"no":"05","title":"Feelings & Health","phase":"B","weeks":"9–10","focus":"Name emotions and body parts, say \"I need…,\" visit the nurse, basic health.","standards":{"wida":{"standards":["SI"],"keyUses":["Inform"]}},"function":"Say how I feel and what I need","grammar":["I am ___ (tired / sick / okay).","I have a ___ache.","My ___ hurts.","I need ___.","Do you need ___?"],"vocabulary":{"core":["happy","sad","tired","sick","hungry","thirsty","cold","hot","scared","okay","head","stomach","throat","hand","arm","leg","hurt","pain","nurse","medicine","water","rest"],"academic":["symptom","injury","emergency","describe","health","wellness","appointment"]},"foundationalLiteracy":"Body-part labeling with a diagram. The -ache compound pattern (headache, stomachache, toothache) as a spelling and meaning family.","culturalNote":"Handle this unit with care. Newcomers may have experienced trauma, injury, or loss in transit, and questions about the body and how you feel can surface it. Never require a student to disclose. Keep the emotional vocabulary factual and low-stakes, offer a non-verbal way to opt out, and know your school's referral path before you teach it. Also: describing pain to an adult is culturally variable — some students are taught to endure it silently. Say plainly that telling the nurse is the right thing to do here.","cards":[{"id":"u05-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Point to a body part or a feeling face when it is named.","scaffold":"Body diagram and a feelings-face chart. Pointing is a complete answer.","check":"Identifies 6 body parts and 4 feelings from spoken words.","l1Bridge":"Body-part and feeling words glossed in the home language; pointing is always sufficient."},"2":{"canDo":"Understand a spoken question about how I feel and what hurts.","scaffold":"Nurse role-play script with picture support. Questions limited to 4 known frames.","check":"Responds appropriately to 4 of 5 spoken health questions.","l1Bridge":"Preview the nurse's questions in the home language so the student knows what will be asked."},"3":{"canDo":"Follow spoken health instructions and understand a follow-up question.","scaffold":"Recorded nurse dialogue at normal rate with a note-catcher.","check":"Reports the instruction given and answers a follow-up about duration or severity.","l1Bridge":"Follow-up questions about duration and severity glossed in advance."}}},{"id":"u05-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Say one word or point to show how I feel or what hurts.","scaffold":"Feelings card and body diagram on the desk. Pointing accepted without speech.","check":"Communicates a need or feeling to an adult by word or gesture.","l1Bridge":"Student may name the symptom in the home language. Getting help outranks producing English."},"2":{"canDo":"Tell the nurse what hurts and how I feel using a frame.","scaffold":"Frame strip: My ___ hurts. I feel ___. I need ___.","check":"Produces a 2-sentence report of a symptom and a need.","l1Bridge":"Frame rehearsed after hearing the equivalent in the home language."},"3":{"canDo":"Describe a symptom with detail and answer follow-up questions.","scaffold":"Detail bank: since when, how bad, what helps. Open frame.","check":"Describes a symptom with onset and severity and answers two follow-ups.","l1Bridge":"A distressed student may describe the symptom in the home language first, then in English."}}},{"id":"u05-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize health and safety signs and the word nurse.","scaffold":"Real signage photos: nurse, exit, first aid, do not enter.","check":"Matches 5 safety signs to their meanings.","l1Bridge":"Safety signs glossed in the home language and NOT faded — this is a safety skill, not a language test."},"2":{"canDo":"Read a simple health form and find the fields I must fill in.","scaffold":"Enlarged form with required fields highlighted and icons on each label.","check":"Identifies all required fields on an unfamiliar simple form.","l1Bridge":"Form field labels glossed in the home language."},"3":{"canDo":"Read a short set of care instructions and say what to do and when.","scaffold":"Instruction card with a sequencing organizer (first / then / if).","check":"Orders 4 instruction steps and identifies the condition that triggers step 4.","l1Bridge":"Care instructions provided bilingually; the trigger condition is identified in English."}}},{"id":"u05-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Circle or copy a feeling word on a check-in slip.","scaffold":"Daily check-in slip with four faces and words. Circling is sufficient.","check":"Completes a daily check-in independently for five consecutive days.","l1Bridge":"Check-in slip printed bilingually."},"2":{"canDo":"Fill in a nurse pass or a simple health form.","scaffold":"Labeled form, word bank of symptoms and body parts.","check":"Completes a nurse pass with name, symptom, and time.","l1Bridge":"Symptom word bank shown bilingually."},"3":{"canDo":"Write a short note explaining an absence or a health need.","scaffold":"Model note plus a reason bank. Requires a date and a reason.","check":"Writes a 3-sentence note with date, reason, and request.","l1Bridge":"Absence note may be drafted in the home language and finalized in English with support."}}}],"workedTask":{"domain":"Speaking","prompt":"Tell someone you don't feel well","levels":{"1":{"say":"[body part].","scaffold":"Points to the place that hurts on their own body or on a diagram and says the single word. No sentence required — the goal is that a hurt student gets help."},"2":{"say":"I feel [feeling]. My [body part] hurts. I need [need].","scaffold":"Three-slot frame on a card the student can hand to the nurse if speaking is too hard in the moment."},"3":{"say":"I've had a [symptom] since [time]. It hurts when I [action]. I think I need to [request].","scaffold":"Open frame plus a detail bank for onset and severity — the language a doctor's office will expect later in life."}}}},{"no":"06","title":"Family & Home","phase":"B","weeks":"11–12","focus":"Family members, describe people, rooms and where I live.","standards":{"wida":{"standards":["SI"],"keyUses":["Inform","Narrate"]}},"function":"Describe the people I live with and where I live","grammar":["I live with ___.","This is my ___.","He/She is ___ (tall / kind / twelve).","I have ___ brothers and ___ sisters.","There is / There are ___."],"vocabulary":{"core":["mother","father","sister","brother","grandmother","grandfather","aunt","uncle","cousin","baby","house","apartment","room","kitchen","bedroom","bathroom","live","together"],"academic":["family","relative","household","describe","appearance","generation","guardian"]},"foundationalLiteracy":"Possessive 's in print. Compound words for rooms (bed-room, bath-room) as a decoding pattern.","culturalNote":"This unit can be painful. Many newcomers are separated from parents, live with distant relatives or a sponsor, are unaccompanied minors, or have lost family members. Never assign a family tree as required work, never ask who a student lives with in front of peers, and always offer an alternative: describe a person who is important to you. Also avoid assuming a nuclear family — extended and multi-household families are the norm for most of the world.","cards":[{"id":"u06-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Point to a family member in a picture when the word is said.","scaffold":"Generic family picture cards, not the student's own family.","check":"Identifies 6 family words from spoken input.","l1Bridge":"Kinship terms glossed carefully — they rarely map one-to-one between languages."},"2":{"canDo":"Understand a short spoken description of a person and pick them out.","scaffold":"Four photos varying by one or two features. Description replayed on request.","check":"Selects the correct person from 4 photos in 4 of 5 trials.","l1Bridge":"Descriptive adjectives glossed before the photo task."},"3":{"canDo":"Follow a spoken description of a family and map the relationships.","scaffold":"Blank relationship web to fill in while listening. Played twice.","check":"Correctly places 5 people and their relationships from connected speech.","l1Bridge":"Relationship web may be annotated in the home language."}}},{"id":"u06-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Name family members and say who I live with in single words.","scaffold":"Picture cards. One-word answers fully accepted.","check":"Names 4 family members and indicates who they live with.","l1Bridge":"Student may use the home-language kinship term; teacher supplies the nearest English word and names the mismatch."},"2":{"canDo":"Describe a person using two or three sentences.","scaffold":"Frame: This is my ___. He/She is ___. Adjective bank with pictures.","check":"Produces 3 framed sentences describing one person.","l1Bridge":"Adjective bank shown bilingually."},"3":{"canDo":"Describe my home and the people in it, and ask a partner about theirs.","scaffold":"Open frame, adjective and room bank, one modeled question to ask back.","check":"Describes home and people in connected speech and asks a reciprocal question.","l1Bridge":"Plan the description in the home language, deliver it in English including the question back."}}},{"id":"u06-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Match family words to pictures.","scaffold":"Word–picture cards with a model line already matched.","check":"Matches 6 of 8 family words to pictures.","l1Bridge":"Family word-picture cards glossed once."},"2":{"canDo":"Read a short description of a family and answer who questions.","scaffold":"5-sentence passage with a picture and glossed vocabulary.","check":"Answers 4 of 5 literal who and how many questions.","l1Bridge":"Passage vocabulary glossed in the margin."},"3":{"canDo":"Read a longer description and infer a relationship that isn't stated directly.","scaffold":"Passage plus an inference prompt: How do you know? Evidence sentence starter.","check":"Makes one correct inference and cites the sentence that supports it.","l1Bridge":"Inference prompt given in the home language; evidence is cited from the English text."}}},{"id":"u06-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Label pictures of people and rooms.","scaffold":"Picture page with a word bank and labeling lines.","check":"Labels 6 items correctly.","l1Bridge":"Word bank shown bilingually."},"2":{"canDo":"Write 3–4 sentences describing a person who is important to me.","scaffold":"Frames plus an adjective bank. Student chooses the person freely.","check":"Writes 3 sentences with a subject, a verb, and one adjective each.","l1Bridge":"Student may draft in the home language; final sentences in English."},"3":{"canDo":"Write a paragraph describing my home and who is in it.","scaffold":"Paragraph organizer (topic sentence, 3 details, closing). There is/are reminder.","check":"Writes a 5-sentence paragraph with a topic sentence and correct there is/are.","l1Bridge":"Organizer headings glossed; the paragraph is written in English."}}}],"workedTask":{"domain":"Speaking","prompt":"Describe someone important to you","levels":{"1":{"say":"My [relation]. [adjective].","scaffold":"Two picture cards — one person, one adjective. Student places them side by side and names them. Teacher expands into a sentence and the student echoes."},"2":{"say":"This is my [relation]. She is [adjective] and [adjective]. She lives in [place].","scaffold":"Three-sentence frame with an adjective bank. Student may use a photo or a drawing."},"3":{"say":"The person I want to tell you about is my [relation]. She's [adjective], and she [action] every day. I miss her because [reason]. Who is important to you?","scaffold":"Open frame with a because clause and a reciprocal question. The because is the academic-language move — this is where opinion becomes explanation."}}}},{"no":"07","title":"Food & Cafeteria","phase":"B","weeks":"13–14","focus":"Foods, likes and dislikes, order lunch, ask for quantities.","standards":{"wida":{"standards":["SI"],"keyUses":["Inform"]}},"function":"Get food I can eat and say what I like and don't like","grammar":["I like ___. / I don't like ___.","I want ___, please.","Can I have ___?","How much / how many ___?","I can't eat ___.","Count vs. non-count nouns: an apple / some rice"],"vocabulary":{"core":["breakfast","lunch","dinner","milk","water","juice","bread","rice","chicken","beans","fruit","vegetables","apple","tray","line","hungry","full","like","want","please","some","more"],"academic":["quantity","portion","nutrition","ingredient","allergy","preference","menu"]},"foundationalLiteracy":"Reading a menu as a text type — scanning columns rather than reading left to right. Plural -s on food nouns.","culturalNote":"Food is where dignity and hunger meet, so be careful. Many newcomers qualify for free lunch and may not know it, or may be ashamed to use it — tell them plainly and privately that it is normal. Religious dietary restrictions (halal, kosher, vegetarian) matter enormously and students often cannot identify which US foods violate them, so teach 'Does this have pork in it?' as a survival phrase. Some students have experienced real food scarcity; never use games about wasting or throwing away food.","cards":[{"id":"u07-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Point to a food when it is named aloud.","scaffold":"Real photographs of the actual cafeteria offerings, not clip art.","check":"Identifies 8 of 10 spoken food words.","l1Bridge":"Use photos of the actual serving line — food is largely language-neutral when shown."},"2":{"canDo":"Understand a spoken cafeteria question and respond.","scaffold":"Recorded server prompts: Milk or juice? Do you want a fruit?","check":"Responds appropriately to 4 of 5 spoken serving-line questions.","l1Bridge":"Serving-line questions previewed in the home language."},"3":{"canDo":"Follow a spoken description of a meal and identify what's in it.","scaffold":"Menu description played at normal rate with an ingredient note-catcher.","check":"Lists 4 components of a described meal and flags one restricted ingredient.","l1Bridge":"Ingredient terms glossed precisely; dietary-restriction vocabulary must be exact."}}},{"id":"u07-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Name a food and say yes, no, or please in the lunch line.","scaffold":"Pocket picture card of the day's options. Pointing plus please is a full success.","check":"Gets the intended food using words, the card, or both.","l1Bridge":"Pocket card printed bilingually so the student can order without speaking English."},"2":{"canDo":"Order lunch and say what I like using a frame.","scaffold":"Frame strip: Can I have ___, please? I like ___. I don't like ___.","check":"Completes a serving-line exchange using a full polite request.","l1Bridge":"Polite request frame rehearsed after the home-language equivalent."},"3":{"canDo":"Ask about ingredients and explain what I can't eat and why.","scaffold":"Open frame plus a restriction bank (allergy, religion, vegetarian) and because.","check":"Asks an ingredient question and explains a restriction with a because clause.","l1Bridge":"Rehearse the restriction in the home language first. Accuracy matters more than fluency here."}}},{"id":"u07-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize food words with picture support.","scaffold":"Word–photo matching using the school's own menu items.","check":"Matches 8 food words to photos.","l1Bridge":"Menu items glossed once alongside photos."},"2":{"canDo":"Read the daily menu and choose what I want.","scaffold":"Enlarged real menu with icons added to each line.","check":"Selects a full meal from the printed menu and reads the choices aloud.","l1Bridge":"Menu category headings glossed in the home language."},"3":{"canDo":"Read a food label and find an ingredient I need to avoid.","scaffold":"Real package labels with the ingredient list boxed. Target words listed on a strip.","check":"Locates a specified ingredient on 3 of 3 unfamiliar labels.","l1Bridge":"Allergen and ingredient terms provided bilingually and NOT faded — this is a safety translation."}}},{"id":"u07-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Copy food words and circle what I like.","scaffold":"Picture-and-word grid with like/don't like columns to check.","check":"Sorts 8 foods into like and don't like columns.","l1Bridge":"Like / don't like columns labeled bilingually."},"2":{"canDo":"Write sentences about foods I like and don't like.","scaffold":"Frames plus a food word bank with pictures.","check":"Writes 4 sentences using like and don't like correctly.","l1Bridge":"Food word bank shown bilingually."},"3":{"canDo":"Write a short description of a meal from my home country.","scaffold":"Paragraph organizer plus an ingredient and adjective bank. Student is the expert here.","check":"Writes 5 sentences naming ingredients and explaining when the meal is eaten.","l1Bridge":"The home-country meal may be drafted in the home language; the student is the expert and should not be capped by English."}}}],"workedTask":{"domain":"Speaking","prompt":"Order your lunch","levels":{"1":{"say":"[food], please.","scaffold":"Points at the food or shows a pocket picture card and says please. The serving line moves fast — this has to work under real time pressure."},"2":{"say":"Can I have [food] and [drink], please? I don't like [food].","scaffold":"Two-part frame practiced with a partner before going to the real cafeteria. Menu in hand."},"3":{"say":"Excuse me, does the [dish] have [ingredient] in it? I can't eat it because [reason]. Could I have [alternative] instead?","scaffold":"Open frame with an ingredient question, a because clause, and a proposed alternative — self-advocacy about a real constraint."}}}},{"no":"08","title":"My Community","phase":"B","weeks":"15–16","focus":"Places in town, ask for and give directions, transportation, staying safe.","standards":{"wida":{"standards":["SI","SS"],"keyUses":["Inform","Explain"]}},"function":"Get where I need to go and ask for help in my community","grammar":["Where is the ___?","Go straight. Turn left / right.","It's next to / across from / between ___.","How do I get to ___?","I take the ___ (bus / train).","Prepositions of place and movement"],"vocabulary":{"core":["store","bank","hospital","clinic","library","park","bus","bus stop","train","street","corner","left","right","straight","near","far","stop","help","police","emergency","address"],"academic":["community","transportation","route","location","direction","resource","public","service"]},"foundationalLiteracy":"Reading street signs and addresses. Number-and-word combinations (1400 South, Route 9). Own address to automaticity — this is a safety skill, not just a literacy one.","culturalNote":"Teach 911 explicitly: what it is for, that it is free, and that it works from any phone. Do NOT make claims about whether calling brings immigration consequences — that varies by jurisdiction and enforcement posture, and a teacher is not a lawyer. Many newcomer families avoid police contact for well-founded reasons; acknowledge that honestly rather than reassuring past what you know, and route questions to a local immigrant legal-aid organization. Districts must have this note reviewed by counsel and localized before use. Frame the unit around independence and safety, and make sure every student can say their own address and a caregiver's phone number from memory before it ends.","cards":[{"id":"u08-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Point to a community place or a direction arrow when named.","scaffold":"Picture cards of local places and large left/right/straight arrows.","check":"Identifies 6 places and 3 direction words from spoken input.","l1Bridge":"Place words glossed; direction arrows are language-neutral."},"2":{"canDo":"Follow a two-step spoken direction on a simple map.","scaffold":"Neighborhood map with a start marker. Directions repeated on request.","check":"Traces the correct route from a 2-step spoken direction in 4 of 5 trials.","l1Bridge":"Direction vocabulary pre-taught in the home language."},"3":{"canDo":"Follow multi-step spoken directions and a transit announcement.","scaffold":"Recorded bus announcement plus a 3-step direction. Note-catcher provided.","check":"Identifies the correct stop and traces a 3-step route from one listening.","l1Bridge":"Transit announcement note-catcher headings glossed."}}},{"id":"u08-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Name a place and say my address or ask for help in one word.","scaffold":"Wallet card with address and emergency contact. Help as a taught single word.","check":"States or shows own address and says help when prompted by a scenario.","l1Bridge":"Wallet card printed bilingually with address and emergency contact. This is a safety artifact, not a worksheet."},"2":{"canDo":"Ask for directions to a place using a frame.","scaffold":"Frame: Excuse me, where is the ___? / How do I get to ___?","check":"Asks a complete direction question and repeats the answer back.","l1Bridge":"Frame rehearsed after the home-language equivalent."},"3":{"canDo":"Give directions to someone else and explain which bus to take.","scaffold":"Preposition and sequence bank (first, then, after that). Map to reference.","check":"Gives a 3-step direction a peer can follow and names the correct route.","l1Bridge":"Plan the directions in the home language, give them in English."}}},{"id":"u08-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize community signs and my own address in print.","scaffold":"Photo cards of real local signage: stop, exit, open, closed, hospital.","check":"Matches 6 signs to meanings and identifies own address from 4 options.","l1Bridge":"Community and safety signs glossed and NOT faded — over-scaffold safety, never under."},"2":{"canDo":"Read a bus schedule or a simple map key.","scaffold":"Real transit schedule, enlarged, with the target route highlighted and a key glossed.","check":"Finds the departure time for a given stop in 4 of 5 attempts.","l1Bridge":"Transit schedule key glossed in the home language."},"3":{"canDo":"Read information about a community resource and explain what it offers.","scaffold":"Simplified flyer for a real local service (clinic, library card, food pantry).","check":"Identifies what the service provides, who qualifies, and how to access it.","l1Bridge":"Resource flyers provided in the home language wherever the district has translations."}}},{"id":"u08-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Write my address and an emergency contact number.","scaffold":"Wallet-card template with labeled fields. Copied, then reproduced from memory.","check":"Writes own full address and one emergency number without a model.","l1Bridge":"Address order differs by country; show the US order explicitly in the home language."},"2":{"canDo":"Label a map of my neighborhood and write a simple direction.","scaffold":"Blank map plus a place word bank and direction sentence frames.","check":"Labels 6 places and writes 2 correct direction sentences.","l1Bridge":"Place word bank shown bilingually."},"3":{"canDo":"Write directions from school to a place in my community.","scaffold":"Sequence-word bank and a numbered organizer. Must include at least three steps.","check":"Writes 4 sequenced steps using correct prepositions and sequence words.","l1Bridge":"Sequence the directions in the home language, write them in English."}}}],"workedTask":{"domain":"Speaking","prompt":"Ask a stranger for directions","levels":{"1":{"say":"[place]?","scaffold":"Shows a written place name or points at a map and says the word with rising intonation. Works with a stranger who speaks no shared language."},"2":{"say":"Excuse me. Where is the [place], please?","scaffold":"Polite frame plus the taught repair move: Can you show me on the map? Practiced as a role-play before use."},"3":{"say":"Excuse me, how do I get to [place] from here? Is it walking distance, or should I take the [bus]? So I go [direction] and then turn [direction] — is that right?","scaffold":"Open frame with a confirmation move at the end. Repeating the direction back is the comprehension-check strategy this level is really teaching."}}}},{"no":"09","title":"Daily Routines","phase":"C","weeks":"17–18","focus":"Present tense, frequency words, describe a typical day at school and home.","standards":{"wida":{"standards":["SI","LA"],"keyUses":["Inform","Narrate"]}},"function":"Describe what I do regularly and how often I do it","grammar":["Simple present: I wake up at ___. She works at ___.","Third-person -s: he goes, she takes","Frequency adverbs: always, usually, sometimes, never","Time sequencing: first, then, after that, finally","Do you ___? / Does he ___?"],"vocabulary":{"core":["wake up","get up","eat","go","come","start","finish","study","work","sleep","walk","ride","always","usually","sometimes","never","every day","on weekends"],"academic":["routine","schedule","frequency","sequence","typical","daily","describe","process"]},"foundationalLiteracy":"The -s ending on third-person verbs versus the -s plural on nouns — a persistent confusion worth naming explicitly. Reading a paragraph as a connected text rather than a list of sentences.","culturalNote":"This is the first unit where students narrate their own lives at paragraph length, and home routines vary widely — some students work jobs, care for siblings, or send money home. Don't let 'a typical day' become an implicit comparison in which their life looks wrong. Let students narrate school routines if home is too personal. Note also that a student who works a night shift is not lazy when they sleep in class; this unit often surfaces that information for the first time.","cards":[{"id":"u09-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Match a spoken routine verb to a picture of the action.","scaffold":"Action picture cards in a daily sequence. Pointing accepted.","check":"Identifies 8 of 10 routine verbs from spoken input.","l1Bridge":"Routine verbs glossed alongside action photos."},"2":{"canDo":"Understand a short spoken routine and put the actions in order.","scaffold":"Picture strip to sequence while listening. Audio replayed on request.","check":"Orders 5 actions correctly from a spoken description.","l1Bridge":"Sequence words glossed before the ordering task."},"3":{"canDo":"Follow a spoken routine and catch how often each thing happens.","scaffold":"Note-catcher with action and frequency columns. Normal rate, played twice.","check":"Records 4 actions with their correct frequency adverbs.","l1Bridge":"Frequency adverbs glossed — they rarely map cleanly and are a persistent error source."}}},{"id":"u09-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Name a daily action and say when I do it.","scaffold":"Picture cards plus a clock. Two-word answers accepted: eat, seven.","check":"Names 5 daily actions with an approximate time.","l1Bridge":"Student may name the action in the home language; teacher supplies the English verb."},"2":{"canDo":"Describe my morning using sequence words and a frame.","scaffold":"Frame: First I ___. Then I ___. After that I ___. Verb bank with pictures.","check":"Produces 4 sequenced sentences about a real morning routine.","l1Bridge":"Sequence frame rehearsed after the home-language equivalent."},"3":{"canDo":"Describe my routine with frequency words and ask a partner about theirs.","scaffold":"Frequency bank plus a modeled question. Open frame.","check":"Uses 3 different frequency adverbs correctly and asks a reciprocal question.","l1Bridge":"Plan the usual-versus-exception contrast in the home language, deliver it in English."}}},{"id":"u09-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Read routine verbs with picture support.","scaffold":"Word–picture cards for 10 high-frequency daily verbs.","check":"Matches 8 of 10 verbs to action pictures.","l1Bridge":"Verb-picture cards glossed once."},"2":{"canDo":"Read a short paragraph about someone's day and answer when questions.","scaffold":"6-sentence passage with times bolded and vocabulary glossed.","check":"Answers 4 of 5 literal when and what questions.","l1Bridge":"Passage vocabulary glossed in the margin."},"3":{"canDo":"Read two routines and compare them.","scaffold":"Two short passages plus a Venn organizer and comparison sentence starters.","check":"Identifies 2 similarities and 2 differences and states one in a full sentence.","l1Bridge":"Comparison sentence starters glossed; the comparison is written in English."}}},{"id":"u09-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Write times next to pictures of daily actions.","scaffold":"Picture timeline with blank time slots and a word bank.","check":"Completes a 6-action timeline with times and copied verbs.","l1Bridge":"Timeline word bank shown bilingually."},"2":{"canDo":"Write 4–5 sentences about my day using sequence words.","scaffold":"Sequence-word bank plus a lined organizer with one line per step.","check":"Writes 5 sentences using at least 3 different sequence words.","l1Bridge":"Sequence-word bank shown bilingually."},"3":{"canDo":"Write a paragraph about my routine using frequency adverbs correctly.","scaffold":"Paragraph organizer with a topic sentence. Frequency-adverb placement reminder.","check":"Writes a 6-sentence paragraph with correct third-person -s and adverb placement.","l1Bridge":"Draft the paragraph in the home language if needed; final version in English."}}}],"workedTask":{"domain":"Speaking","prompt":"Describe your school day","levels":{"1":{"say":"[time]. [action].","scaffold":"Lays out picture cards in order and names each with a time. The sequence is carried by the cards, not by language."},"2":{"say":"First I [action]. Then I [action]. After that I [action]. I finish at [time].","scaffold":"Four-slot sequence frame with a verb bank. The sequence words are now doing the work the cards used to do."},"3":{"say":"I usually [action] at [time], but sometimes I [action] instead because [reason]. On weekends it's different — I never [action]. What about you?","scaffold":"Open frame contrasting usual and exceptional with because. Handling an exception to a general rule is a genuine academic-language move."}}}},{"no":"10","title":"Describing My World","phase":"C","weeks":"19–20","focus":"Adjectives, colors and sizes, make comparisons between things.","standards":{"wida":{"standards":["SI","LA"],"keyUses":["Inform"]}},"function":"Describe and compare things with detail","grammar":["Adjective before noun: a big red book","Comparatives: bigger than, more expensive than","Superlatives: the biggest, the most important","as ___ as","It looks / feels / sounds ___."],"vocabulary":{"core":["big","small","long","short","tall","old","new","hot","cold","fast","slow","heavy","light","expensive","cheap","colors","shapes","than","same","different"],"academic":["compare","contrast","describe","similar","difference","characteristic","property","measure","category"]},"foundationalLiteracy":"The -er and -est endings as a spelling pattern, including the doubling rule (big → bigger). Recognizing that longer adjectives take more instead.","culturalNote":"Comparison is the first genuinely academic language function in the sequence — it is what science labs, math word problems, and social studies all run on. Point this out to students explicitly: this unit is the one that starts paying off in their other classes. Avoid comparisons of people's appearance, wealth, or home countries; keep the objects neutral.","cards":[{"id":"u10-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Point to an object when it is described by one attribute.","scaffold":"Object sets varying by a single feature: the big ball, the red ball.","check":"Selects the correct object from 4 in 8 of 10 trials.","l1Bridge":"Adjectives glossed with paired objects; teach opposites together."},"2":{"canDo":"Understand a spoken comparison of two things.","scaffold":"Paired picture cards. Comparison sentences limited to taught structures.","check":"Identifies which of two items is described in 4 of 5 comparisons.","l1Bridge":"Explain comparison structure in the home language — languages mark comparison very differently."},"3":{"canDo":"Follow a spoken description of several items and rank them.","scaffold":"Ranking organizer. Description at normal rate, played twice.","check":"Correctly orders 4 items from a spoken description using superlatives.","l1Bridge":"Ranking organizer headings glossed."}}},{"id":"u10-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Describe an object with one adjective.","scaffold":"Adjective picture bank. Two-word answers accepted: big book.","check":"Describes 6 objects with an appropriate adjective.","l1Bridge":"Student may give the adjective in the home language; teacher supplies the English."},"2":{"canDo":"Compare two things using a comparative frame.","scaffold":"Frame: The ___ is ___er than the ___. Object pairs provided.","check":"Produces 4 correct comparative sentences about real objects.","l1Bridge":"Explicitly contrast how the home language forms comparatives with English -er / more."},"3":{"canDo":"Compare several things and justify which is best for a purpose.","scaffold":"Superlative bank plus a because frame. Real decision scenario provided.","check":"Uses a superlative and justifies the choice with a because clause.","l1Bridge":"Justify the choice in the home language first, then in English with because."}}},{"id":"u10-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Match adjectives to pictures.","scaffold":"Word–picture cards with opposite pairs shown together.","check":"Matches 10 adjectives, including 4 opposite pairs.","l1Bridge":"Adjective-picture cards glossed once."},"2":{"canDo":"Read a description and identify which object it refers to.","scaffold":"3-sentence descriptions with 4 candidate pictures. Adjectives bolded.","check":"Correctly identifies the object in 4 of 5 descriptions.","l1Bridge":"Description vocabulary glossed."},"3":{"canDo":"Read a comparison text and extract the criteria being compared.","scaffold":"Short product or animal comparison plus a criteria table to complete.","check":"Fills a 2-item, 3-criteria comparison table from a paragraph.","l1Bridge":"Criteria table headings glossed; the table is completed in English."}}},{"id":"u10-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Label pictures with adjectives.","scaffold":"Picture page with an adjective word bank and labeling lines.","check":"Labels 8 pictures with appropriate adjectives.","l1Bridge":"Adjective word bank shown bilingually."},"2":{"canDo":"Write comparative sentences about two objects.","scaffold":"Frames plus an adjective bank marked for -er versus more.","check":"Writes 4 comparative sentences with correct -er/more choice.","l1Bridge":"Mark the -er / more split explicitly against the home-language pattern."},"3":{"canDo":"Write a paragraph comparing two things and stating a preference.","scaffold":"Comparison organizer with criteria columns. Transition bank: however, but, while.","check":"Writes a 6-sentence comparison with 2 criteria, a transition, and a justified preference.","l1Bridge":"Plan the comparison in the home language, write it in English."}}}],"workedTask":{"domain":"Speaking","prompt":"Compare two things","levels":{"1":{"say":"[adjective].","scaffold":"Holds up or points to the item that matches the adjective the teacher says. Production is one word; the comparison is made physically."},"2":{"say":"The [object] is [adjective]er than the [object].","scaffold":"Single comparative frame with both objects physically present on the desk."},"3":{"say":"Both [object] and [object] are [shared quality], but the [object] is [comparative] because [reason]. I think the [object] is the [superlative] for [purpose].","scaffold":"Open frame that names a shared quality first, then a difference, then a purpose-based judgment. This is the structure of a lab conclusion and a text-comparison essay."}}}},{"no":"11","title":"My Story","phase":"C","weeks":"21–22","focus":"Simple past, sequence words, narrate my journey and past events.","standards":{"wida":{"standards":["LA"],"keyUses":["Narrate"]}},"function":"Tell about something that happened in the past","grammar":["Simple past regular: -ed (walked, started)","Simple past irregular: went, came, was/were, had, saw, took","Time markers: yesterday, last year, two years ago, when I was ___","Sequence: first, next, then, after that, finally","Did you ___? / I didn't ___."],"vocabulary":{"core":["was","were","went","came","had","saw","took","moved","left","arrived","started","stayed","before","after","ago","last","then","finally"],"academic":["past","event","sequence","narrative","experience","timeline","chronological","recount"]},"foundationalLiteracy":"The -ed ending and its three spoken sounds (/t/, /d/, /əd/) — walked, moved, started. High-frequency irregular past forms as sight words, since they cannot be decoded by rule.","culturalNote":"This is the highest-risk unit in the entire sequence. Many newcomers have journeys involving violence, family separation, detention, or loss, and 'tell your story' is a demand that can retraumatize. Three rules, non-negotiable: (1) Narrating one's own migration is ALWAYS optional — offer a neutral alternative (a past school day, a holiday, a story from a book) with no penalty and no explanation required. (2) Never make personal narratives public — no gallery walks, no reading aloud, no posting on the wall unless a student volunteers. (3) Know your mandated-reporter obligations and your school's counseling referral path before you begin, because disclosures do happen in this unit. Teach the past tense with neutral content first, then let students choose their own topic. A student who writes about a soccer game instead of a border crossing has met the standard completely.","cards":[{"id":"u11-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Tell whether a spoken sentence is about now or before.","scaffold":"Two-card sort: now / before. Contrasting pairs said aloud.","check":"Sorts 8 of 10 sentences correctly by time.","l1Bridge":"Explain the now / before sort in the home language — past marking varies enormously across languages."},"2":{"canDo":"Understand a short spoken story and put events in order.","scaffold":"Picture strip to sequence while listening. Replayed on request.","check":"Orders 5 story events correctly from spoken narration.","l1Bridge":"Story events previewed in the home language before the ordering task."},"3":{"canDo":"Follow a longer spoken narrative and identify when each event happened.","scaffold":"Timeline organizer with blank date markers. Normal rate, played twice.","check":"Places 5 events on a timeline with their correct time markers.","l1Bridge":"Timeline may be annotated in the home language."}}},{"id":"u11-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"
