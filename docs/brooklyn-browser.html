canDo":"Say one thing I did, using a past-tense word.","scaffold":"Picture cards of past actions plus a past-verb bank. Single sentence accepted.","check":"Produces 3 sentences with a recognizable past-tense verb.","l1Bridge":"Student may tell the event in the home language first; teacher supplies the English past form. Never require English for a personal story."},"2":{"canDo":"Tell about a past event in 3–4 sentences using sequence words.","scaffold":"Sequence frame plus an irregular-past reference strip. Topic is student's choice.","check":"Narrates a chosen past event in 4 sentences with correct sequencing.","l1Bridge":"Rehearse the sequence in the home language, deliver in English. The topic stays the student's choice."},"3":{"canDo":"Tell a longer story and explain why something happened.","scaffold":"Open frame with a because clause and a feelings bank. Topic entirely student-chosen.","check":"Narrates in connected past tense and explains one cause with because.","l1Bridge":"The student may narrate in the home language and then retell in English, or decline. Both are full credit."}}},{"id":"u11-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize common past-tense verbs in print.","scaffold":"Present/past word pairs on cards: go/went, is/was, see/saw.","check":"Matches 8 present-tense verbs to their past forms.","l1Bridge":"Present/past verb pairs glossed once."},"2":{"canDo":"Read a short narrative and answer what happened questions.","scaffold":"6-sentence story with past verbs bolded and vocabulary glossed.","check":"Answers 4 of 5 literal comprehension questions about a narrative.","l1Bridge":"Narrative vocabulary glossed in the margin."},"3":{"canDo":"Read a personal narrative and identify the order of events and the narrator's feelings.","scaffold":"Published newcomer narrative plus a timeline and a feelings-evidence organizer.","check":"Sequences 5 events and cites one sentence showing how the narrator felt.","l1Bridge":"Offer published newcomer narratives in the home language where they exist."}}},{"id":"u11-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Write or copy simple past sentences about a picture sequence.","scaffold":"Picture strip with past-verb word bank and one line per picture.","check":"Writes 4 sentences with correct past-tense verbs from a word bank.","l1Bridge":"Past-verb word bank shown bilingually."},"2":{"canDo":"Write a short narrative about an event I choose.","scaffold":"Sequence organizer plus an irregular-past reference strip. Topic free.","check":"Writes 5 sentences in consistent past tense with 3 sequence words.","l1Bridge":"Drafting in the home language is permitted; final version in English."},"3":{"canDo":"Write a personal narrative with a beginning, middle, and end.","scaffold":"Narrative organizer with a setting, events, and a closing reflection. Topic free.","check":"Writes a 7-sentence narrative in consistent past tense with a closing reflection.","l1Bridge":"The student may write the narrative in the home language and translate with support. The language of the first draft is never the point."}}}],"workedTask":{"domain":"Speaking","prompt":"Tell about something that happened (student chooses the topic)","levels":{"1":{"say":"I [past verb].","scaffold":"Picks a picture card of a past action and says one sentence. Any topic — a game, a meal, a trip. No personal disclosure of any kind is required."},"2":{"say":"First, I [past verb]. Then I [past verb]. After that, I [past verb]. It was [feeling].","scaffold":"Four-slot sequence frame with an irregular-past strip. Student chooses the event; a neutral option is always offered alongside."},"3":{"say":"[Time marker], I [past verb]. It happened because [reason]. I felt [feeling], but later [past verb]. Now I [present verb].","scaffold":"Open frame moving past → cause → feeling → present. The past-to-present pivot lets a student end on their own terms, which matters more here than the grammar does."}}}},{"no":"12","title":"Goals & School Success","phase":"C","weeks":"23–24","focus":"Talk about the future and \"want to,\" study skills, academic-language on-ramp.","standards":{"wida":{"standards":["LA","SI"],"keyUses":["Explain"]}},"function":"Say what I want to do and explain how I will get there","grammar":["I want to ___. / I would like to ___.","going to future: I am going to ___.","will future: I will ___.","need to / have to / can","If I ___, I can ___.","because / so / in order to"],"vocabulary":{"core":["want","need","hope","plan","goal","future","next year","graduate","job","college","study","practice","improve","try","help","ask","finish"],"academic":["goal","plan","achieve","requirement","credit","diploma","transcript","career","apply","explain","reason","evidence","purpose"]},"foundationalLiteracy":"Reading a transcript and a graduation-requirement list as document text types. Multi-syllable academic words broken into syllables (grad-u-ate, re-quire-ment).","culturalNote":"Be concrete and be honest. Secondary newcomers, especially those arriving at 16 or 17, face real structural problems: credit deficits, age-out rules that vary by state, and interrupted transcripts. Bring in the counselor for this unit — students need actual information about their own credits, not just the vocabulary for talking about goals. Do not promise outcomes that depend on immigration status, and do not give legal advice; connect families to qualified help instead. Many students carry an obligation to work and send money home, so treat 'get a job' as a legitimate goal rather than steering everyone toward college.","cards":[{"id":"u12-listening","domain":"Listening","mode":"Interpretive","levels":{"1":{"canDo":"Tell whether a spoken sentence is about now or later.","scaffold":"Two-card sort: now / later. Contrasting pairs said aloud.","check":"Sorts 8 of 10 sentences correctly by time reference.","l1Bridge":"Explain the now / later sort in the home language."},"2":{"canDo":"Understand someone's spoken goal and the reason for it.","scaffold":"Recorded peer statements. Goal and reason columns to complete.","check":"Identifies the goal and the reason in 4 of 5 spoken statements.","l1Bridge":"Goal and reason vocabulary glossed."},"3":{"canDo":"Follow a spoken explanation of requirements and identify the steps.","scaffold":"Counselor explanation at normal rate plus a steps organizer. Played twice.","check":"Lists 4 steps and identifies one condition (if/then) from the explanation.","l1Bridge":"The counselor's explanation should be INTERPRETED, not glossed — graduation requirements are too consequential to approximate."}}},{"id":"u12-speaking","domain":"Speaking","mode":"Expressive","levels":{"1":{"canDo":"Say one thing I want using a frame.","scaffold":"Picture bank of goals plus the frame I want ___.","check":"States 3 wants using the frame and a picture prompt.","l1Bridge":"Student may state the goal in the home language; teacher supplies the English."},"2":{"canDo":"State a goal and one reason for it.","scaffold":"Frame: I want to ___ because ___. Goal and reason banks provided.","check":"States a goal with a because clause that genuinely explains it.","l1Bridge":"Rehearse the because frame after the home-language equivalent."},"3":{"canDo":"Explain a goal, the steps to reach it, and what I need help with.","scaffold":"Open frame with a sequence bank and an if/then structure. Counselor present.","check":"Explains a goal with 2 steps, one condition, and a specific request for help.","l1Bridge":"Plan the request in the home language; hold any conversation about credits with an interpreter present."}}},{"id":"u12-reading","domain":"Reading","mode":"Interpretive","levels":{"1":{"canDo":"Recognize school and goal words in print.","scaffold":"Word–picture cards: graduate, job, college, study, help.","check":"Matches 8 goal-related words to pictures or meanings.","l1Bridge":"Goal words glossed once."},"2":{"canDo":"Read a short profile of someone's plan and find their goal.","scaffold":"5-sentence profiles with goal statements bolded and vocabulary glossed.","check":"Identifies the goal and one step in 3 of 3 profiles.","l1Bridge":"Profile vocabulary glossed."},"3":{"canDo":"Read graduation requirements and identify what I still need.","scaffold":"Simplified requirement list plus the student's own transcript, with a checklist.","check":"Identifies 3 requirements already met and 2 still outstanding.","l1Bridge":"Graduation requirements MUST be provided in the home language. Never make a student parse their own transcript in a new language."}}},{"id":"u12-writing","domain":"Writing","mode":"Expressive","levels":{"1":{"canDo":"Write or copy a goal sentence.","scaffold":"Frame with a picture goal bank and one writing line.","check":"Writes 2 goal sentences using the frame correctly.","l1Bridge":"Goal word bank shown bilingually."},"2":{"canDo":"Write 3–4 sentences about my goals and reasons.","scaffold":"Frames plus goal and reason banks. Because reminder at the top.","check":"Writes 4 sentences, at least 2 with a because clause.","l1Bridge":"Drafting in the home language is permitted."},"3":{"canDo":"Write a short plan explaining my goal, my steps, and what I need.","scaffold":"Plan organizer: goal, three steps, one obstacle, one request. Transition bank.","check":"Writes a 7-sentence plan with sequenced steps, one if/then, and a clear request.","l1Bridge":"The plan may be drafted in the home language. The English copy is for the counselor; the family copy should be in the home language."}}}],"workedTask":{"domain":"Speaking","prompt":"Explain a goal and how you'll reach it","levels":{"1":{"say":"I want [goal].","scaffold":"Chooses a picture from a goal bank and says the frame with one slot filled. The goal can be anything — finish this class, play soccer, get a job."},"2":{"say":"I want to [goal] because [reason]. I need to [step].","scaffold":"Two-sentence frame linking a goal to a reason and one action. The because is now expected, not optional."},"3":{"say":"My goal is to [goal]. To do that, I need to [step] and [step]. The hard part is [obstacle], so I'm going to [strategy]. Could you help me with [specific request]?","scaffold":"Open frame chaining goal → steps → obstacle → strategy → request. This is the whole sequence's destination: a student who can advocate for themselves with an adult in an institution, in English, unprompted."}}}}];</script>
<script>
var U = window.__BROOKLYN__;
var LEVELS = {1:'Entering',2:'Emerging',3:'Developing'};
var PHASE = {A:['Orientation & Survival','Weeks 1–8'],
             B:['Daily Life & Community','Weeks 9–16'],
             C:['Expanding Language','Weeks 17–24']};
var tray = [], mode = 'student', copies = 1;

try{ var s=localStorage.getItem('brooklyn.tray'); if(s) tray=JSON.parse(s);
     var m=localStorage.getItem('brooklyn.mode'); if(m) mode=m; }catch(e){}
function save(){ try{ localStorage.setItem('brooklyn.tray',JSON.stringify(tray));
                      localStorage.setItem('brooklyn.mode',mode); }catch(e){} }

function esc(s){return String(s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function unit(no){return U.filter(function(u){return u.no===no;})[0];}
function card(u,d){return u.cards.filter(function(c){return c.domain===d;})[0];}
function key(t){return t.u+'|'+t.d+'|'+t.l;}
function inTray(t){return tray.some(function(x){return key(x)===key(t);});}
function studentCanDo(s){return 'I can '+s.charAt(0).toLowerCase()+s.slice(1);}

/* ---------------- sheets ---------------- */
function taskArea(u,c,lv,l){
  var wt=u.workedTask, out='';
  if(wt.domain===c.domain && wt.levels[l]){
    var frame=esc(wt.levels[l].say).replace(/\[([^\]]+)\]/g,'<span class="blank"></span>');
    out+='<div class="sect">Say it</div><div class="frame">“'+frame+'”</div>';
  }
  if(c.domain==='Listening'||c.domain==='Reading'){
    out+='<div class="sect">Your answers</div><div class="boxes">'+
         [1,2,3,4].map(function(n){return '<div class="abox">'+n+'</div>';}).join('')+'</div>';
  }
  if(c.domain==='Writing'){
    var n = l==='1'?4:(l==='2'?5:7);
    out+='<div class="sect">Write here</div><div class="lines">'+
         Array(n).fill('<i></i>').join('')+'</div>';
  }
  if(c.domain==='Speaking' && wt.domain!==c.domain){
    out+='<div class="sect">Practice with a partner</div><div class="boxes">'+
         ['1st try','2nd try','3rd try'].map(function(t){return '<div class="abox">'+t+'</div>';}).join('')+'</div>';
  }
  return out;
}

function studentSheet(u,c,l){
  var lv=c.levels[l], bank=u.vocabulary.core.slice(0,10);
  return '<section class="sheet">'+
   '<div class="sh"><div><div class="course">Brooklyn · Unit '+esc(u.no)+' · '+esc(u.title)+'</div>'+
   '<h2>'+esc(u.function)+'</h2></div>'+
   '<div class="lvlbox">Level '+l+'<br>'+LEVELS[l]+'<br>'+esc(c.domain)+'</div></div>'+
   '<div class="idrow"><span>Name: <i></i></span><span>Date: <i></i></span></div>'+
   '<div class="obj"><b>'+esc(studentCanDo(lv.canDo))+'</b></div>'+
   '<div class="imgslot">Picture support goes here — not yet produced</div>'+
   taskArea(u,c,l,l)+
   '<div class="sect">Word bank</div><div class="bank">'+
     bank.map(function(w){return '<span>'+esc(w)+'</span>';}).join('')+'</div>'+
   '<div class="foot"><span>Brooklyn · '+esc(c.id)+' · L'+l+'</span>'+
   '<span>WIDA (2020), independent alignment</span></div></section>';
}

function teacherSheet(u,c,l){
  var lv=c.levels[l];
  return '<section class="sheet">'+
   '<div class="sh"><div><div class="course">Brooklyn · Teacher page · Unit '+esc(u.no)+'</div>'+
   '<h2>'+esc(u.title)+'</h2></div>'+
   '<div class="lvlbox">Level '+l+'<br>'+LEVELS[l]+'<br>'+esc(c.domain)+'</div></div>'+
   '<div class="obj"><b>Can-Do:</b> '+esc(lv.canDo)+'<br><b>WIDA:</b> '+
     esc(u.standards.wida.standards.join(' · '))+' · '+esc(c.domain)+
     ' · <b>Key Use:</b> '+esc(u.standards.wida.keyUses.join(', '))+'</div>'+
   '<div class="tgrid">'+
     '<div class="trow"><b>Scaffold</b>'+esc(lv.scaffold)+'</div>'+
     '<div class="trow"><b>Home-language bridge</b>'+esc(lv.l1Bridge)+'</div>'+
     '<div class="trow"><b>Check</b>'+esc(lv.check)+'</div>'+
     '<div class="trow"><b>Target structures</b>'+esc(u.grammar.join(' · '))+'</div>'+
     '<div class="trow"><b>Foundational literacy</b>'+esc(u.foundationalLiteracy)+'</div>'+
   '</div>'+
   (u.culturalNote?'<div class="tnote"><b>Teaching note — read before you teach this</b>'+esc(u.culturalNote)+'</div>':'')+
   '<div class="foot"><span>Brooklyn · '+esc(c.id)+' · L'+l+' · teacher</span>'+
   '<span>Formative evidence — not a proficiency-level measure</span></div></section>';
}

function sheetsFor(t){
  var u=unit(t.u), c=card(u,t.d), out=[];
  if(mode==='student'||mode==='both') out.push(studentSheet(u,c,t.l));
  if(mode==='teacher'||mode==='both') out.push(teacherSheet(u,c,t.l));
  return out.join('');
}

/* ---------------- views ---------------- */
function viewUnits(){
  var h='<p class="lede">Twelve units. Open a unit, pick the pages you need, and print exactly those — '+
        'each level is a separate page, so a mixed-level class is one trip to the printer.</p>';
  ['A','B','C'].forEach(function(p){
    var us=U.filter(function(u){return u.phase===p;});
    if(!us.length) return;
    h+='<div class="phasebar"><span class="ph">Phase '+p+'</span><h2>'+PHASE[p][0]+
       '</h2><span class="wk">'+PHASE[p][1]+'</span></div><div class="ugrid">';
    us.forEach(function(u){
      h+='<a class="ucard" href="#/u'+u.no+'"><div class="n">Unit '+esc(u.no)+' · '+esc(u.weeks)+'</div>'+
         '<h3>'+esc(u.title)+'</h3><p>'+esc(u.focus)+'</p><div class="doms">'+
         u.cards.map(function(c){return '<span class="dchip">'+esc(c.domain)+'</span>';}).join('')+
         '<span class="dchip">3 levels</span></div></a>';
    });
    h+='</div>';
  });
  return h;
}

function viewUnit(no){
  var u=unit(no); if(!u) return '<p>Unit not found.</p>';
  var h='<div class="uhead"><div class="n">Unit '+esc(u.no)+' · '+esc(u.weeks)+' · Phase '+u.phase+'</div>'+
    '<h1>'+esc(u.title)+'</h1><p class="lede">'+esc(u.focus)+'</p>'+
    '<div class="chips"><span class="chip"><b>WIDA</b> '+esc(u.standards.wida.standards.join(' · '))+'</span>'+
    '<span class="chip"><b>Key Use</b> '+esc(u.standards.wida.keyUses.join(', '))+'</span></div>'+
    '<p class="fn">'+esc(u.function)+'</p>'+
    '<details class="meta"><summary>Unit detail — structures, vocabulary, teaching note</summary><div class="metagrid">'+
      '<div class="box"><h4>Target structures</h4><ul>'+u.grammar.map(function(g){return '<li>'+esc(g)+'</li>';}).join('')+'</ul></div>'+
      '<div class="box"><h4>Foundational literacy</h4><p style="font-size:14px;color:var(--ink-2)">'+esc(u.foundationalLiteracy)+'</p></div>'+
      '<div class="box"><h4>Core vocabulary</h4><div class="words">'+u.vocabulary.core.map(function(w){return '<span class="w">'+esc(w)+'</span>';}).join('')+'</div></div>'+
      '<div class="box"><h4>Academic vocabulary</h4><div class="words">'+u.vocabulary.academic.map(function(w){return '<span class="w">'+esc(w)+'</span>';}).join('')+'</div></div>'+
    '</div>'+(u.culturalNote?'<div class="note"><h4>Teaching note</h4><p>'+esc(u.culturalNote)+'</p></div>':'')+'</details></div>';

  h+='<div class="pickhead"><h2>Pages</h2><span class="hint">Tick any pages, then print them together.</span>'+
     '<span class="spacer"></span>'+
     '<button class="btn" data-all="'+u.no+'">Select all 12</button>'+
     '<button class="btn" data-none="'+u.no+'">Clear</button></div>';

  h+='<div class="matrix"><div class="mh">Domain</div>'+
     [1,2,3].map(function(l){return '<div class="mh">Level '+l+' · '+LEVELS[l]+'</div>';}).join('');
  u.cards.forEach(function(c){
    h+='<div class="rowlabel">'+esc(c.domain)+'<small>'+esc(c.mode)+'</small></div>';
    [1,2,3].forEach(function(l){
      var t={u:u.no,d:c.domain,l:String(l)}, on=inTray(t);
      h+='<div class="pcell l'+l+(on?' sel':'')+'" data-lvl="Level '+l+' · '+LEVELS[l]+'">'+
         '<div class="cando">'+esc(c.levels[l].canDo)+'</div><div class="acts">'+
         '<label><input type="checkbox" data-t="'+u.no+'|'+c.domain+'|'+l+'"'+(on?' checked':'')+'> Print</label>'+
         '<a class="view" href="#/u'+u.no+'/'+c.domain.toLowerCase()+'/'+l+'">Open →</a></div></div>';
    });
  });
  return h+'</div>';
}

function viewPage(no,dom,l){
  var u=unit(no); if(!u) return '<p>Not found.</p>';
  var c=u.cards.filter(function(x){return x.domain.toLowerCase()===dom;})[0];
  if(!c||!c.levels[l]) return '<p>Page not found.</p>';
  var t={u:no,d:c.domain,l:l}, on=inTray(t);
  return '<div class="toolrow">'+
    '<button class="btn primary" id="addOne">'+(on?'✓ In print tray':'+ Add to print tray')+'</button>'+
    '<button class="btn" id="printOne">Print this page</button>'+
    '<span class="spacer"></span>'+
    '<div class="segrow" style="max-width:290px">'+
      ['student','teacher','both'].map(function(m){
        return '<button data-mode="'+m+'" aria-pressed="'+(mode===m)+'">'+m[0].toUpperCase()+m.slice(1)+'</button>';}).join('')+
    '</div></div>'+
    '<div class="sheetwrap">'+sheetsFor(t)+'</div>';
}

/* ---------------- tray ---------------- */
function renderTray(){
  var b=document.getElementById('trayBody');
  if(!tray.length){ b.innerHTML='<div class="empty">No pages selected yet.<br>Open a unit and tick the pages you want.</div>'; }
  else{
    b.innerHTML=tray.map(function(t,i){
      var u=unit(t.u), c=card(u,t.d);
      return '<div class="titem"><div class="meta"><div class="t">Unit '+esc(t.u)+' · '+esc(t.d)+' · L'+t.l+'</div>'+
        '<div class="s">'+esc(u.title)+' — '+esc(c.levels[t.l].canDo)+'</div></div>'+
        '<button data-rm="'+i+'" title="Remove">×</button></div>';
    }).join('');
  }
  document.getElementById('trayCount').textContent=tray.length;
  document.getElementById('trayBtn').disabled = !tray.length;
  document.getElementById('printBtn').disabled = !tray.length;
  document.querySelectorAll('#trayModes button').forEach(function(x){
    x.setAttribute('aria-pressed', String(x.dataset.mode===mode));});
  buildPrint();
}

function buildPrint(){
  var n=Math.max(1,Math.min(40,copies|0)), out='';
  for(var r=0;r<n;r++) tray.forEach(function(t){ out+=sheetsFor(t); });
  document.getElementById('printArea').innerHTML=out;
}

function toggle(t,on){
  var i=tray.findIndex(function(x){return key(x)===key(t);});
  if(on&&i<0) tray.push(t);
  if(!on&&i>=0) tray.splice(i,1);
  save(); renderTray();
}

/* ---------------- routing ---------------- */
function crumbs(p){
  var h='<a href="#/">All units</a>';
  if(p[0]){var u=unit(p[0]); if(u) h+='<span class="sep">/</span><a href="#/u'+u.no+'">Unit '+u.no+' · '+esc(u.title)+'</a>';}
  if(p[1]) h+='<span class="sep">/</span><span>'+esc(p[1][0].toUpperCase()+p[1].slice(1))+' · Level '+p[2]+'</span>';
  return h;
}

function route(){
  var m=(location.hash||'#/').replace(/^#\/?/,'').split('/').filter(Boolean);
  var main=document.getElementById('main'), p=[];
  if(!m.length){ main.innerHTML=viewUnits(); }
  else if(m[0][0]==='u'&&m.length===1){ p=[m[0].slice(1)]; main.innerHTML=viewUnit(p[0]); }
  else if(m[0][0]==='u'&&m.length===3){ p=[m[0].slice(1),m[1],m[2]]; main.innerHTML=viewPage(p[0],m[1],m[2]); }
  else main.innerHTML='<p>Not found. <a href="#/">Back to units</a></p>';
  document.getElementById('crumbs').innerHTML=crumbs(p);
  window.scrollTo(0,0);
  renderTray();
}

document.addEventListener('click',function(ev){
  var el=ev.target;
  if(el.id==='trayBtn'||el.id==='trayClose'||el.classList.contains('scrim')){
    document.getElementById('tray').classList.toggle('open', el.id==='trayBtn');
    document.getElementById('scrim').classList.toggle('open', el.id==='trayBtn');
  }
  if(el.dataset.rm!==undefined){ tray.splice(+el.dataset.rm,1); save(); renderTray(); route(); }
  if(el.dataset.all){ var u=unit(el.dataset.all);
    u.cards.forEach(function(c){[1,2,3].forEach(function(l){
      var t={u:u.no,d:c.domain,l:String(l)}; if(!inTray(t)) tray.push(t);});});
    save(); route(); }
  if(el.dataset.none){ tray=tray.filter(function(t){return t.u!==el.dataset.none;}); save(); route(); }
  if(el.dataset.mode){ mode=el.dataset.mode; save(); route(); }
  if(el.id==='clearAll'){ tray=[]; save(); route(); }
  if(el.id==='printBtn'){ buildPrint(); window.print(); }
  if(el.id==='addOne'){
    var m=location.hash.replace(/^#\/?/,'').split('/');
    var u=unit(m[0].slice(1)), c=u.cards.filter(function(x){return x.domain.toLowerCase()===m[1];})[0];
    var t={u:u.no,d:c.domain,l:m[2]}; toggle(t,!inTray(t)); route(); }
  if(el.id==='printOne'){
    var m2=location.hash.replace(/^#\/?/,'').split('/');
    var u2=unit(m2[0].slice(1)), c2=u2.cards.filter(function(x){return x.domain.toLowerCase()===m2[1];})[0];
    document.getElementById('printArea').innerHTML=sheetsFor({u:u2.no,d:c2.domain,l:m2[2]});
    window.print(); setTimeout(buildPrint,600); }
});

document.addEventListener('change',function(ev){
  var el=ev.target;
  if(el.dataset.t){ var a=el.dataset.t.split('|'); toggle({u:a[0],d:a[1],l:a[2]}, el.checked);
    el.closest('.pcell').classList.toggle('sel', el.checked); }
  if(el.id==='copies'){ copies=Math.max(1,Math.min(40,+el.value||1)); buildPrint(); }
});

window.addEventListener('hashchange',route);
route();
</script>
</body>
